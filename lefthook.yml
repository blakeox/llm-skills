pre-commit:
  commands:
    prettier:
      glob: "*.{md,json}"
      run: npx prettier --write {staged_files} && git add {staged_files}
    version-check:
      run: |
        bash "$(git rev-parse --show-toplevel)/version-check.sh" 2>/dev/null || echo "INFO: Skills repo has updates available — run 'git pull' when ready."
      fail_text: ""

pre-push:
  commands:
    repo-privacy-check:
      run: |
        PRIVATE=$(gh repo view icci/icci-skills --json isPrivate -q '.isPrivate' 2>/dev/null)
        if [ "$PRIVATE" != "true" ]; then
          echo "CRITICAL: icci-skills repo is NOT private! Aborting push."
          exit 1
        fi
        echo "Repo privacy check passed."

