pre-commit:
  commands:
    prettier:
      glob: "*.{md,json}"
      run: npx prettier --write {staged_files} && git add {staged_files}

pre-push:
  commands:
    repo-privacy-check:
      run: |
        PRIVATE=$(gh repo view icci/icci-HD-assistant --json isPrivate -q '.isPrivate' 2>/dev/null)
        if [ "$PRIVATE" != "true" ]; then
          echo "CRITICAL: icci-HD-assistant repo is NOT private! Aborting push."
          exit 1
        fi
        echo "Repo privacy check passed."
